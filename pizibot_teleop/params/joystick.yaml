joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.05
    autorepeat_rate: 30.0
    # PS4-style Bluetooth gamepad mapping
    # Axes: 0=Left-X (yaw), 1=Left-Y (linear), 2=L2, 3=Right-X, 4=Right-Y, 5=R2
    # Buttons: 0=Cross, 1=Circle, 2=Triangle, 3=Square, 9=L1, 10=R1

teleop_node:
  ros__parameters:
    # Linear velocity control via Left stick Y-axis
    axis_linear:
      x: 1  # Left-Y axis (vertical)
    scale_linear:
      x: 0.08  # Normal speed: 0.08 m/s
    scale_linear_turbo:
      x: 1.0 # Turbo speed: 0.8 m/s

    # Angular velocity control via Left stick X-axis
    axis_angular:
      yaw: 0  # Left-X axis (horizontal)
    scale_angular:
      yaw: 1.0  # Normal rotation: 0.75 rad/s
    scale_angular_turbo:
      yaw: 2.0  # Turbo rotation: 2.0 rad/s

    require_enable_button: true
    enable_button: 10  # R1 button to enable teleoperation
    enable_turbo_button: 9  # L1 button for turbo mode

    publish_stamped_twist: true

